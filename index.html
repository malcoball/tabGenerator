<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Assets/pick.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Guitar Tab Generator</title>
</head>
<body>
    <div id="container">
        <h1 id="title">Guitar Tab Generator</h1>

        <div id="inputNames">
            <p>Scale:</p>
            <p>Length:</p>
            <p>Root (0 = open E string):</p>
            <p>Double Note Chance:</p>
        </div>

        <div id="inputs">
            <select id="scales" name="scales">
            </select>
            

            <input type="number" id="length">
            <input type="number" id="root" min="0" max="36">
            <input type="number" id="double" mix="0" max="36">
        </div>

        <button id="btn1">Refresh</button>
        <button id="play1" class="playBtn">Play</button>
        <hr>
        <div id="tabPreview" class="tabTable">
            <table>
                <tr id="g">
                    <td>[</td>
                </tr>
                <tr id="d">
                    <td>[</td>
                    
                </tr>
                <tr id="a">
                    <td>[</td>
                    
                </tr>
                <tr id="e">
                    <td>[</td>
                    
                </tr>
            </table>
        </div>
        <hr>
        <button id="btn2">Add to tab</button>
        <button id="play2" class="playBtn">Play</button>

        <hr>
        <div>
            <table>
                <tr id="bigg">
                    <td>G[</td>
                </tr>
                <tr id="bigd">
                    <td>D[</td>
                    
                </tr>
                <tr id="biga">
                    <td>A[</td>
                    
                </tr>
                <tr id="bige">
                    <td>E[</td>
                    
                </tr>
            </table>
        </div>

    </div>
    <div id="bpm">
        BPM<input type="number" name="" id="bpmInp">
    </div>

    <button id="start">Start</button>
    <button id="stop">Stop</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.45/Tone.js "></script>
    <script src="tabGen.js"></script>
    <script src="synth.js"></script>
</body>
</html>
